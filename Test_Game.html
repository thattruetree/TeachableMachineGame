<!DOCTYPE html>
<html>
<head>
  <title>Gesture Platformer</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.10.0/dist/tf.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@0.8/dist/teachablemachine-image.min.js"></script>

  <style>
    body {
      font-family: Arial;
      background: linear-gradient(#1e1e2f, #12121a);
      color: white;
      text-align: center;
      margin: 0;
      padding: 20px;
      min-width: 0;
    }

    h2 {
      margin-bottom: 10px;
    }

    #ui {
      display: flex;
      justify-content: center;
      align-items: center;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 10px;
    }

    input {
      width: 400px;
      max-width: min(90vw, 400px);
      padding: 6px;
      box-sizing: border-box;
    }

    button {
      padding: 8px 12px;
      cursor: pointer;
      border: none;
      border-radius: 6px;
    }

    #startBtn { background: #4caf50; color: white; }
    #restartBtn { background: #f44336; color: white; }

    #container {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-top: 15px;
      align-items: flex-start;
      max-width: 1020px;
      margin-left: auto;
      margin-right: auto;
    }

    canvas {
      border: 2px solid #fff;
      background: #87ceeb;
      width: min(760px, calc(100vw - 300px));
      max-width: calc(100vw - 300px);
      height: auto;
      box-sizing: border-box;
    }

    #cameraPanel {
      width: 220px;
      flex: 0 0 220px;
    }

    #camera {
      border: 2px solid #fff;
      background: #000;
      min-height: 200px;
      box-sizing: border-box;
    }

    #camera canvas {
      width: 100%;
      max-width: 200px;
      border: 0;
      display: block;
      margin: 0 auto;
    }

    .cameraPlaceholder {
      display: flex;
      min-height: 200px;
      align-items: center;
      justify-content: center;
      padding: 12px;
      box-sizing: border-box;
      color: white;
    }

    #score {
      font-size: 18px;
      margin-top: 10px;
    }

    #status {
      min-height: 22px;
      margin-top: 8px;
      font-size: 14px;
      color: #d8f0ff;
    }

    #predictions {
      margin-top: 10px;
      text-align: left;
      font-size: 14px;
    }

    .prediction {
      margin-bottom: 8px;
    }

    .predictionLabel {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 3px;
    }

    .predictionBar {
      height: 10px;
      border: 1px solid rgba(255, 255, 255, 0.7);
      background: rgba(255, 255, 255, 0.16);
    }

    .predictionFill {
      height: 100%;
      width: 0%;
      background: #4caf50;
    }

    @media (max-width: 900px) {
      body {
        padding: 12px;
      }

      #container {
        flex-direction: column;
        align-items: center;
        gap: 12px;
      }

      canvas {
        width: 100%;
        max-width: 760px;
      }

      #cameraPanel {
        width: min(100%, 760px);
        flex-basis: auto;
        display: grid;
        grid-template-columns: minmax(160px, 220px) minmax(180px, 1fr);
        gap: 12px;
        align-items: start;
      }

      #predictions {
        margin-top: 0;
      }
    }

    @media (max-width: 520px) {
      body {
        padding: 8px;
      }

      h2 {
        font-size: 20px;
      }

      #score {
        font-size: 15px;
      }

      #status {
        font-size: 13px;
      }

      #cameraPanel {
        grid-template-columns: 1fr;
      }

      #camera {
        min-height: 160px;
      }

      .cameraPlaceholder {
        min-height: 160px;
      }

      #camera canvas {
        max-width: 160px;
      }
    }
  </style>
</head>

<body>

<h2>Gesture Platformer</h2>

<div id="ui">
  <input id="modelURL" placeholder="Paste Teachable Machine model URL">
  <button id="startBtn" onclick="startGame()">Start</button>
  <button id="restartBtn" onclick="restartGame()">Restart</button>
</div>

<div id="score">Score: 0</div>
<div id="status">Paste a Teachable Machine image model URL to use gesture controls.</div>

<div id="container">
  <canvas id="game" width="760" height="400"></canvas>
  <div id="cameraPanel">
    <div id="camera"></div>
    <div id="predictions">Predictions will appear here after the model starts.</div>
  </div>
</div>

<script>
let model, webcam;
let ctx;

const canvasWidth = 760;
const canvasHeight = 400;
const worldWidth = 2450;
const gravity = 0.75;
const movePower = 0.8;
const friction = 0.82;
const maxSpeed = 5.2;
const jumpPower = -13;
const groundY = 340;
const confidenceThreshold = 0.75;
const timeLimitSeconds = 180;
const maxCoinPoints = 1000;
const minCoinPoints = 100;

let player, hazards, coins, platforms, frame, score, gameOver, won, timeUp;
let cameraX, startTime, finishTime;
let gameRunning = false;
let animationStarted = false;
let keyboardMode = false;
let lastControl = "None";
let lastCoinPoints = 0;
let keys = {};

function setupCanvas() {
  if (!ctx) {
    const canvas = document.getElementById("game");
    ctx = canvas.getContext("2d");
  }
}

async function startGame() {
  if (gameRunning && !gameOver && !won && !timeUp) return;

  let URL = document.getElementById("modelURL").value.trim();
  if (URL) {
    if (!URL.endsWith("/")) URL += "/";

    try {
      const cacheBuster = "?v=" + Date.now();
      model = await tmImage.load(
        URL + "model.json" + cacheBuster,
        URL + "metadata.json" + cacheBuster
      );

      webcam = new tmImage.Webcam(200, 200, true);
      await webcam.setup();
      await webcam.play();
    } catch (error) {
      console.error(error);
      setStatus("Could not load the model or camera. Check the URL and camera permission.");
      return;
    }

    document.getElementById("camera").innerHTML = "";
    document.getElementById("camera").appendChild(webcam.canvas);
    keyboardMode = false;
  } else {
    model = null;
    webcam = null;
    keyboardMode = true;
    document.getElementById("camera").innerHTML =
      "<div class='cameraPlaceholder'>Keyboard mode<br>WASD or arrows</div>";
    document.getElementById("predictions").innerText =
      "No Teachable Machine model loaded. Use A/D or arrow keys to move, and W/Up/Space to jump.";
  }

  setupCanvas();

  resetGame();
  gameRunning = true;
  if (model && webcam) {
    setStatus("Game running with Teachable Machine controls.");
  } else {
    setStatus("Keyboard mode running. Use A/D to move and W to jump.");
  }

  if (!animationStarted) {
    animationStarted = true;
    requestAnimationFrame(loop);
  }
}

function restartGame() {
  setupCanvas();
  resetGame();
  gameRunning = true;
  setStatus("Restarted. Each coin is worth more when you collect it early.");

  if (!animationStarted) {
    animationStarted = true;
    requestAnimationFrame(loop);
  }
}

function resetGame() {
  player = {
    x: 40,
    y: 220,
    vx: 0,
    vy: 0,
    w: 28,
    h: 30,
    onGround: false
  };

  hazards = [
    { x: 355, y: 322, w: 38, h: 22, dir: 1, minX: 320, maxX: 470, speed: 1.7, color: "#8c3a55" },
    { x: 770, y: 322, w: 38, h: 22, dir: -1, minX: 690, maxX: 890, speed: 2, color: "#405c9a" },
    { x: 555, y: 164, w: 34, h: 22, dir: -1, minX: 525, maxX: 615, speed: 1.4, color: "#7b4ca0" },
    { x: 1180, y: 322, w: 38, h: 22, dir: 1, minX: 1110, maxX: 1300, speed: 1.9, color: "#8c3a55" },
    { x: 1290, y: 139, w: 34, h: 22, dir: 1, minX: 1248, maxX: 1355, speed: 1.5, color: "#405c9a" },
    { x: 1570, y: 322, w: 38, h: 22, dir: -1, minX: 1480, maxX: 1710, speed: 2.1, color: "#7b4ca0" },
    { x: 2035, y: 144, w: 34, h: 22, dir: -1, minX: 1988, maxX: 2108, speed: 1.6, color: "#8c3a55" },
    { x: 2050, y: 322, w: 38, h: 22, dir: 1, minX: 1960, maxX: 2205, speed: 2.2, color: "#405c9a" }
  ];

  platforms = [
    { x: 120, y: 286, w: 125, h: 14 },
    { x: 300, y: 238, w: 130, h: 14 },
    { x: 520, y: 190, w: 120, h: 14 },
    { x: 760, y: 270, w: 150, h: 14 },
    { x: 1010, y: 218, w: 120, h: 14 },
    { x: 1240, y: 165, w: 150, h: 14 },
    { x: 1410, y: 120, w: 95, h: 14 },
    { x: 1500, y: 270, w: 150, h: 14 },
    { x: 1760, y: 220, w: 130, h: 14 },
    { x: 1980, y: 170, w: 160, h: 14 },
    { x: 2145, y: 122, w: 95, h: 14 },
    { x: 2240, y: 260, w: 120, h: 14 }
  ];

  coins = [
    { x: 165, y: 260, r: 9, taken: false },
    { x: 355, y: 212, r: 9, taken: false },
    { x: 580, y: 128, r: 9, taken: false },
    { x: 830, y: 244, r: 9, taken: false },
    { x: 1070, y: 192, r: 9, taken: false },
    { x: 1320, y: 98, r: 9, taken: false },
    { x: 1458, y: 92, r: 9, taken: false },
    { x: 1570, y: 244, r: 9, taken: false },
    { x: 1820, y: 194, r: 9, taken: false },
    { x: 2060, y: 110, r: 9, taken: false },
    { x: 2192, y: 94, r: 9, taken: false },
    { x: 2295, y: 234, r: 9, taken: false }
  ];

  frame = 0;
  score = 0;
  cameraX = 0;
  startTime = performance.now();
  finishTime = 0;
  lastCoinPoints = 0;
  gameOver = false;
  won = false;
  timeUp = false;
  updateScore();

  if (ctx) {
    draw();
  }
}

async function loop() {
  if (gameRunning && !gameOver && !won && !timeUp) {
    if (webcam && model) {
      webcam.update();

      const prediction = await model.predict(webcam.canvas);
      let best = prediction.reduce((a, b) =>
        a.probability > b.probability ? a : b
      );

      updatePredictions(prediction);
      handleControls(best);
    }

    if (keyboardMode) {
      handleKeyboardControls();
    }
    update();
    draw();
  } else if (gameOver) {
    drawEndScreen("Game Over", "Restart and try a cleaner, faster route.");
  } else if (timeUp) {
    drawEndScreen("Time's Up", "Final score: " + score);
  } else if (won) {
    drawEndScreen("You Win!", "Final score: " + score);
  }

  requestAnimationFrame(loop);
}

<!--
  
  Controll Labels:
  Here is a list of labels you can use in your Teachable Machine model to control the game. 
  You can use any combination of these words in the label names, and the game will recognize them.

- Left:  Moves character left
- Right: Moves Character Right
- Jump:  Makes character jump
- Left Jump: Moves character left and jumps at the same time
- Right Jump: Moves character right and jumps at the same time

-->

function handleControls(prediction) {
  const label = prediction.className.toLowerCase();
  const compactLabel = label.replace(/[\s_-]/g, "");
  const confidence = prediction.probability;

  if (confidence < confidenceThreshold) {
    lastControl = "None";
    return;
  }

  if (compactLabel.includes("leftjump") || compactLabel.includes("jumpleft")) {
    moveLeft();
    jump();
    lastControl = "LeftJump";
    return;
  }

  if (compactLabel.includes("rightjump") || compactLabel.includes("jumpright")) {
    moveRight();
    jump();
    lastControl = "RightJump";
    return;
  }

  if (label.includes("right")) {
    moveRight();
    lastControl = "Right";
    return;
  }

  if (label.includes("left")) {
    moveLeft();
    lastControl = "Left";
    return;
  }

  if (label.includes("jump")) {
    jump();
    lastControl = "Jump";
  }
}

function updatePredictions(predictions) {
  const predictionsDiv = document.getElementById("predictions");
  predictionsDiv.innerHTML = "";

  const sortedPredictions = [...predictions].sort((a, b) => b.probability - a.probability);

  for (let prediction of sortedPredictions) {
    const percent = Math.round(prediction.probability * 100);
    const row = document.createElement("div");
    row.className = "prediction";

    const label = document.createElement("div");
    label.className = "predictionLabel";

    const name = document.createElement("span");
    name.innerText = prediction.className;

    const confidence = document.createElement("span");
    confidence.innerText = percent + "%";

    const bar = document.createElement("div");
    bar.className = "predictionBar";

    const fill = document.createElement("div");
    fill.className = "predictionFill";
    fill.style.width = percent + "%";

    label.appendChild(name);
    label.appendChild(confidence);
    bar.appendChild(fill);
    row.appendChild(label);
    row.appendChild(bar);
    predictionsDiv.appendChild(row);
  }
}

function handleKeyboardControls() {
  if (keys.arrowleft || keys.a) moveLeft();
  if (keys.arrowright || keys.d) moveRight();
  if (keys.arrowup || keys.w || keys[" "]) jump();
}

function moveLeft() {
  player.vx -= movePower;
}

function moveRight() {
  player.vx += movePower;
}

function jump() {
  if (player.onGround) {
    player.vy = jumpPower;
    player.onGround = false;
  }
}

function update() {
  frame++;

  if (getTimeLeftSeconds() <= 0) {
    timeUp = true;
    finishTime = performance.now();
    updateScore();
    return;
  }

  player.vx *= friction;
  player.vx = clamp(player.vx, -maxSpeed, maxSpeed);
  player.x += player.vx;

  player.vy += gravity;
  player.y += player.vy;

  player.x = clamp(player.x, 0, worldWidth - player.w);
  player.onGround = false;

  if (player.y + player.h >= groundY) {
    player.y = groundY - player.h;
    player.vy = 0;
    player.onGround = true;
  }

  for (let platform of platforms) {
    const falling = player.vy >= 0;
    const feetWereAbove = player.y + player.h - player.vy <= platform.y;
    if (falling && feetWereAbove && rectsOverlap(player, platform)) {
      player.y = platform.y - player.h;
      player.vy = 0;
      player.onGround = true;
    }
  }

  for (let hazard of hazards) {
    hazard.x += hazard.dir * hazard.speed;
    if (hazard.x < hazard.minX || hazard.x > hazard.maxX) {
      hazard.dir *= -1;
    }

    if (rectsOverlap(player, hazard)) {
      gameOver = true;
      finishTime = performance.now();
    }
  }

  for (let coin of coins) {
    if (!coin.taken && circleHitsRect(coin, player)) {
      coin.taken = true;
      lastCoinPoints = getCoinValue();
      coin.value = lastCoinPoints;
      score += lastCoinPoints;
    }
  }

  if (coins.every(coin => coin.taken)) {
    won = true;
    finishTime = performance.now();
  }

  cameraX = clamp(player.x - canvasWidth * 0.42, 0, worldWidth - canvasWidth);
  updateScore();
}

function draw() {
  ctx.clearRect(0, 0, canvasWidth, canvasHeight);

  let grd = ctx.createLinearGradient(0, 0, 0, canvasHeight);
  grd.addColorStop(0, "#66b7e8");
  grd.addColorStop(0.55, "#cfefff");
  grd.addColorStop(1, "#f7fbff");
  ctx.fillStyle = grd;
  ctx.fillRect(0, 0, canvasWidth, canvasHeight);

  drawBackground();

  ctx.save();
  ctx.translate(-cameraX, 0);

  drawGround();

  for (let platform of platforms) {
    drawPlatform(platform);
  }

  for (let coin of coins) {
    if (!coin.taken) {
      drawCoin(coin);
    }
  }

  drawPlayer();

  for (let hazard of hazards) {
    drawHazard(hazard);
  }

  ctx.restore();

  ctx.fillStyle = "#1e1e2f";
  ctx.font = "14px Arial";
  ctx.fillText("Control: " + lastControl, 12, 22);
  ctx.fillText("Coins: " + collectedCoins() + "/" + coins.length, 12, 42);
  ctx.fillText("Time left: " + formatTime(getTimeLeftSeconds()), 12, 62);
  ctx.fillText("Score: " + score, 12, 82);
  if (lastCoinPoints > 0) {
    ctx.fillText("Last coin: +" + lastCoinPoints, 12, 102);
  }

  const progress = (player.x + player.w) / worldWidth;
  ctx.fillStyle = "rgba(30, 30, 47, 0.25)";
  ctx.fillRect(585, 24, 150, 8);
  ctx.fillStyle = "#ffd43b";
  ctx.fillRect(585, 24, 150 * progress, 8);
}

function drawEndScreen(title, subtitle) {
  draw();
  ctx.fillStyle = "rgba(0,0,0,0.5)";
  ctx.fillRect(0, 0, canvasWidth, canvasHeight);

  ctx.fillStyle = "white";
  ctx.font = "30px Arial";
  ctx.fillText(title, 315, 175);
  ctx.font = "16px Arial";
  ctx.fillText(subtitle, 270, 205);
}

function drawBackground() {
  drawCloud(95 - cameraX * 0.14, 72, 1);
  drawCloud(410 - cameraX * 0.14, 48, 0.8);
  drawCloud(760 - cameraX * 0.14, 90, 1.1);
  drawCloud(1160 - cameraX * 0.14, 60, 0.9);

  ctx.fillStyle = "#7aa6b8";
  drawMountain(-140 - cameraX * 0.22, groundY, 230, 170);
  drawMountain(140 - cameraX * 0.22, groundY, 280, 210);
  drawMountain(490 - cameraX * 0.22, groundY, 250, 180);
  drawMountain(860 - cameraX * 0.22, groundY, 300, 230);

  ctx.fillStyle = "#b7d37f";
  for (let x = -80 - cameraX * 0.45; x < canvasWidth + 160; x += 180) {
    ctx.beginPath();
    ctx.arc(x, groundY + 15, 110, Math.PI, Math.PI * 2);
    ctx.fill();
  }
}

function drawMountain(x, baseY, width, height) {
  ctx.beginPath();
  ctx.moveTo(x, baseY);
  ctx.lineTo(x + width / 2, baseY - height);
  ctx.lineTo(x + width, baseY);
  ctx.closePath();
  ctx.fill();
}

function drawCloud(x, y, scale) {
  ctx.fillStyle = "rgba(255, 255, 255, 0.85)";
  ctx.beginPath();
  ctx.arc(x, y, 22 * scale, 0, Math.PI * 2);
  ctx.arc(x + 25 * scale, y - 8 * scale, 28 * scale, 0, Math.PI * 2);
  ctx.arc(x + 55 * scale, y, 22 * scale, 0, Math.PI * 2);
  ctx.fill();
}

function drawGround() {
  const groundGradient = ctx.createLinearGradient(0, groundY, 0, canvasHeight);
  groundGradient.addColorStop(0, "#61b64f");
  groundGradient.addColorStop(1, "#28743c");
  ctx.fillStyle = groundGradient;
  ctx.fillRect(0, groundY, worldWidth, canvasHeight - groundY);

  ctx.fillStyle = "#3f8f45";
  for (let x = 0; x < worldWidth; x += 38) {
    ctx.fillRect(x, groundY + 12 + (x % 76 === 0 ? 8 : 0), 24, 5);
  }
}

function drawPlatform(platform) {
  ctx.fillStyle = "#7d5634";
  ctx.fillRect(platform.x, platform.y, platform.w, platform.h);
  ctx.fillStyle = "#67b957";
  ctx.fillRect(platform.x, platform.y - 6, platform.w, 8);
  ctx.fillStyle = "rgba(255, 255, 255, 0.18)";
  ctx.fillRect(platform.x + 6, platform.y - 4, platform.w - 12, 2);
}

function drawCoin(coin) {
  const pulse = Math.sin(frame * 0.12 + coin.x * 0.02) * 1.5;
  ctx.save();
  ctx.translate(coin.x, coin.y);
  ctx.rotate(frame * 0.04);
  ctx.fillStyle = "#ffd43b";
  ctx.strokeStyle = "#8a6500";
  ctx.lineWidth = 2;
  ctx.beginPath();
  for (let i = 0; i < 10; i++) {
    const angle = -Math.PI / 2 + i * Math.PI / 5;
    const radius = i % 2 === 0 ? coin.r + 5 + pulse : coin.r - 2;
    ctx.lineTo(Math.cos(angle) * radius, Math.sin(angle) * radius);
  }
  ctx.closePath();
  ctx.fill();
  ctx.stroke();
  ctx.restore();
}

function drawPlayer() {
  ctx.fillStyle = "rgba(0, 0, 0, 0.18)";
  ctx.beginPath();
  ctx.ellipse(player.x + player.w / 2, player.y + player.h + 4, 18, 5, 0, 0, Math.PI * 2);
  ctx.fill();

  ctx.fillStyle = "#f04f54";
  ctx.fillRect(player.x + 4, player.y + 8, player.w - 8, player.h - 6);
  ctx.fillStyle = "#ffe0bd";
  ctx.fillRect(player.x + 7, player.y, player.w - 14, 13);
  ctx.fillStyle = "#2e3a59";
  ctx.fillRect(player.x + 9, player.y + 4, 4, 4);
  ctx.fillRect(player.x + player.w - 13, player.y + 4, 4, 4);
  ctx.fillStyle = "#353535";
  ctx.fillRect(player.x + 6, player.y + player.h - 3, 7, 5);
  ctx.fillRect(player.x + player.w - 13, player.y + player.h - 3, 7, 5);
}

function drawHazard(hazard) {
  const bodyColor = hazard.color || "#34343f";
  const bob = Math.sin(frame * 0.16 + hazard.x * 0.04) * 2;
  const x = hazard.x;
  const y = hazard.y + bob;

  ctx.fillStyle = "rgba(0, 0, 0, 0.22)";
  ctx.beginPath();
  ctx.ellipse(x + hazard.w / 2, hazard.y + hazard.h + 5, hazard.w * 0.55, 5, 0, 0, Math.PI * 2);
  ctx.fill();

  ctx.fillStyle = bodyColor;
  ctx.beginPath();
  roundedRect(x, y, hazard.w, hazard.h, 7);
  ctx.fill();

  ctx.fillStyle = "#f7f7ff";
  ctx.beginPath();
  ctx.arc(x + hazard.w * 0.33, y + 8, 4, 0, Math.PI * 2);
  ctx.arc(x + hazard.w * 0.67, y + 8, 4, 0, Math.PI * 2);
  ctx.fill();

  ctx.fillStyle = "#151515";
  ctx.beginPath();
  ctx.arc(x + hazard.w * 0.33 + hazard.dir, y + 8, 1.8, 0, Math.PI * 2);
  ctx.arc(x + hazard.w * 0.67 + hazard.dir, y + 8, 1.8, 0, Math.PI * 2);
  ctx.fill();

  ctx.strokeStyle = "#171717";
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(x + 8, y + 15);
  ctx.quadraticCurveTo(x + hazard.w / 2, y + 22, x + hazard.w - 8, y + 15);
  ctx.stroke();

  ctx.fillStyle = "#ffd166";
  for (let i = 0; i < 3; i++) {
    const spikeX = x + 7 + i * ((hazard.w - 14) / 2);
    ctx.beginPath();
    ctx.moveTo(spikeX - 5, y + 1);
    ctx.lineTo(spikeX, y - 10);
    ctx.lineTo(spikeX + 5, y + 1);
    ctx.closePath();
    ctx.fill();
  }

  ctx.fillStyle = "#202026";
  ctx.fillRect(x + 5, hazard.y + hazard.h - 2, 8, 5);
  ctx.fillRect(x + hazard.w - 13, hazard.y + hazard.h - 2, 8, 5);
}

function roundedRect(x, y, width, height, radius) {
  ctx.moveTo(x + radius, y);
  ctx.lineTo(x + width - radius, y);
  ctx.quadraticCurveTo(x + width, y, x + width, y + radius);
  ctx.lineTo(x + width, y + height - radius);
  ctx.quadraticCurveTo(x + width, y + height, x + width - radius, y + height);
  ctx.lineTo(x + radius, y + height);
  ctx.quadraticCurveTo(x, y + height, x, y + height - radius);
  ctx.lineTo(x, y + radius);
  ctx.quadraticCurveTo(x, y, x + radius, y);
}

function rectsOverlap(a, b) {
  return (
    a.x < b.x + b.w &&
    a.x + a.w > b.x &&
    a.y < b.y + b.h &&
    a.y + a.h > b.y
  );
}

function circleHitsRect(circle, rect) {
  const closestX = clamp(circle.x, rect.x, rect.x + rect.w);
  const closestY = clamp(circle.y, rect.y, rect.y + rect.h);
  const dx = circle.x - closestX;
  const dy = circle.y - closestY;
  return dx * dx + dy * dy <= circle.r * circle.r;
}

function clamp(value, min, max) {
  return Math.max(min, Math.min(max, value));
}

function updateScore() {
  document.getElementById("score").innerText =
    "Score: " + score + " | Coins: " + collectedCoins() + "/" + coins.length +
    " | Time left: " + formatTime(getTimeLeftSeconds());
}

function getElapsedSeconds() {
  const end = finishTime || performance.now();
  return Math.max(0, (end - startTime) / 1000);
}

function getTimeLeftSeconds() {
  return Math.max(0, timeLimitSeconds - getElapsedSeconds());
}

function getCoinValue() {
  const timeLeftRatio = getTimeLeftSeconds() / timeLimitSeconds;
  return Math.round(minCoinPoints + (maxCoinPoints - minCoinPoints) * timeLeftRatio);
}

function formatTime(seconds) {
  const wholeSeconds = Math.ceil(seconds);
  const minutes = Math.floor(wholeSeconds / 60);
  const remainingSeconds = wholeSeconds % 60;
  return minutes + ":" + String(remainingSeconds).padStart(2, "0");
}

function collectedCoins() {
  return coins.filter(coin => coin.taken).length;
}

function setStatus(message) {
  document.getElementById("status").innerText = message;
}

window.addEventListener("keydown", event => {
  if (["ArrowLeft", "ArrowRight", "ArrowUp", " "].includes(event.key)) {
    event.preventDefault();
  }
  keys[event.key.toLowerCase()] = true;
});

window.addEventListener("keyup", event => {
  keys[event.key.toLowerCase()] = false;
});

setupCanvas();
resetGame();
</script>
